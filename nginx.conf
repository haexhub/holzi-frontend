# SPA host. The Nuxt build produces a fully static .output/public/
# directory; this server just hands those files out with a history-mode
# fallback so vue-router routes like /chat/abc resolve to index.html.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived cache for hashed Nuxt build assets.
    location /_nuxt/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else: serve the file if it exists, otherwise fall back
    # to index.html so the SPA router can resolve the path client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
